<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGenie Learning Assistant</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>🎓 EduGenie</h1>
    <p class="subtitle">AI Learning System Interface</p>

    <!-- GLOBAL INPUT -->
    <div class="global-input card">
        <textarea id="inputText" placeholder="Enter topic / question / passage..."></textarea>
    </div>

    <!-- MODULE GRID -->
    <div class="grid">

        <div class="module">
            <button onclick="askQuestion()">❓ Ask</button>
            <div id="qnaBox" class="outputBox"></div>
        </div>

        <div class="module">
            <button onclick="explain()">🧠 Explain</button>
            <div id="explainBox" class="outputBox"></div>
        </div>

        <div class="module">
            <button onclick="summarize()">📌 Summarize</button>
            <div id="summaryBox" class="outputBox"></div>
        </div>

        <div class="module">
            <button onclick="generateQuiz()">🧩 Quiz</button>
            <div id="quizBox" class="outputBox"></div>
        </div>

        <div class="module">
            <button onclick="learningPath()">🧭 Path</button>
            <div id="pathBox" class="outputBox"></div>
        </div>

    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
